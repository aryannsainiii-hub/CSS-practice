<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=.card, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
   margin: auto;
   padding: 2em;
   width: 300px;
   background: #1c1f2b;
   text-align: center;
   border-radius: 10px;
   position: relative;
}
.card::after{
   content: '';
   position: absolute;
   height: 100%;
   width: 100%;
   background-image: conic-gradient(red,blue,);
   top: 50%;
   left: 50%;
   translate: -50% -50%;
   z-index: -1;
   padding: 5px;
   border-radius: 10px;
}
    </style>
</head>
<body>
    <div class="card">

    </div>
</body>
</html>
